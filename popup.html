<!DOCTYPE html>
<html lang="en">
<head>
    <title>FOCUS MODE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Focus Mode</h1>
<br>
    <input type="text" id="message" placeholder="Type your own message here...">
    
    <p id="status">Focus Off</p>

    <label class="switch">
        <input type="checkbox" id="toggleFocusMode">
        <span class="slider"></span>
    </label>
    
<marquee behavior="smooth" direction="left">Thanks for using Focus Mode!</marquee>
<script src="popup.js"></script>
</body>
</html>
